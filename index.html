<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WELCOME TO BEANLAND!!!</title>

<style>
body {
  background: linear-gradient(to bottom right, #111, #222);
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
  padding: 30px;
}

h1 {
  font-size: 60px;
  text-shadow: 0 0 15px #00ff99;
}

#coins, #level {
  font-size: 20px;
  margin: 5px;
}

#shop, #secret {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  display: inline-block;
}

button {
  margin: 6px;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00cc88;
  color: white;
}

img {
  max-width: 90%;
  max-height: 60vh;
  margin-top: 20px;
  border-radius: 15px;
}

#loading { opacity: 0.7; }
</style>
</head>

<body>

<h1>WELCOME TO BEANLAND!!!</h1>

<div id="coins">🪙 Coins: 0</div>
<div id="level">📈 Level: 1 (XP: 0/100)</div>

<div id="shop">
  <h3>🛒 Shop</h3>
  <button onclick="buySpeed()">⚡ Speed (10)</button>
  <button onclick="buyQuality()">🧪 Quality (15)</button>
  <button onclick="buyLuck()">🍀 Luck (20)</button>
  <button onclick="buyXPBoost()">📈 XP Boost (25)</button>
</div>

<br>

<button onclick="getMeme()">🎲 Meme</button>
<button onclick="chaosMode()">👹 Chaos</button>
<button onclick="saveGame()">💾 Save</button>

<div id="loading"></div>
<h2 id="title"></h2>
<img id="meme">

<script>

let beanCoins = 0;
let xp = 0;
let level = 1;

let upgrades = {
  speed: 0,
  quality: 0,
  luck: 0,
  xpBoost: 0
};

let recent = [];
let chaos = null;

/* 🐧 SECRET SYSTEM ADDED */
let keyBuffer = "";
let secretsUsed = {
  sudo: false,
  god: false,
  fork: false,
  love: false
};

document.addEventListener("keydown", (e) => {
  keyBuffer += e.key.toLowerCase();
  if (keyBuffer.length > 60) keyBuffer = keyBuffer.slice(-60);
  checkSecrets();
});

function checkSecrets() {

  if (!secretsUsed.sudo && keyBuffer.includes("sudo beans")) {
    secretsUsed.sudo = true;
    beanCoins += 100;
    upgrades.speed += 2;
    updateUI();
    alert("🐧 sudo beans activated (+100 coins)");
  }

  if (!secretsUsed.god && keyBuffer.includes("bean god")) {
    secretsUsed.god = true;
    beanCoins += 250;
    upgrades.luck += 5;
    updateUI();
    alert("👑 BEAN GOD MODE");
  }

  if (!secretsUsed.fork && keyBuffer.includes("fork bomb")) {
    secretsUsed.fork = true;
    chaosMode();
    alert("💥 FORK BOMB ACTIVATED");
  }

  if (!secretsUsed.love && keyBuffer.includes("i love beans")) {
    secretsUsed.love = true;
    beanCoins += 10;
    updateUI();
    document.getElementById("title").innerText =
      "💚 bean affection detected";
  }
}
/* 🐧 END SECRET SYSTEM */

function updateUI(){
  document.getElementById("coins").innerText = "🪙 Coins: " + beanCoins;
  document.getElementById("level").innerText =
    `📈 Level: ${level} (XP: ${xp}/100)`;
}

function addXP(amount){
  let gain = amount + upgrades.xpBoost * 2;

  xp += gain;

  if(xp >= 100){
    xp -= 100;
    level++;
    beanCoins += 10 * level;
  }

  updateUI();
}

function earnCoins(ups){
  let gain = 1;
  if(ups > 500) gain = 5;
  else if(ups > 200) gain = 3;
  else if(ups > 50) gain = 2;

  beanCoins += gain;
  addXP(gain * 3);
  updateUI();
}

function norm(s){return (s||"").toLowerCase().replace(/\s/g,"");}

async function getMeme(){
  document.getElementById("loading").innerText = "fetching chaos...";

  const subs = ["memes","dankmemes","shitposting","me_irl","funny"];
  const sub = subs[Math.floor(Math.random()*subs.length)];

  let data;

  for(let i=0;i<5;i++){
    const res = await fetch(`https://meme-api.com/gimme/${sub}`);
    const d = await res.json();

    if(!d.url || d.nsfw) continue;

    data = d;
    break;
  }

  if(!data) return;

  recent.push(data.url);
  if(recent.length>30) recent.shift();

  document.getElementById("meme").src = data.url;
  document.getElementById("title").innerText = `[r/${sub}] ${data.title}`;

  earnCoins(data.ups || 0);
  document.getElementById("loading").innerText = "";
}

function chaosMode(){
  if(chaos){clearInterval(chaos); chaos=null; return;}

  chaos = setInterval(getMeme, Math.max(200,1200-upgrades.speed*200));
}

// 🛒 UPGRADES
function buySpeed(){ if(beanCoins<10)return;
beanCoins-=10; upgrades.speed++; updateUI(); }

function buyQuality(){ if(beanCoins<15)return;
beanCoins-=15; upgrades.quality++; updateUI(); }

function buyLuck(){ if(beanCoins<20)return;
beanCoins-=20; upgrades.luck++; updateUI(); }

function buyXPBoost(){ if(beanCoins<25)return;
beanCoins-=25; upgrades.xpBoost++; updateUI(); }

// 💾 SAVE SYSTEM
function saveGame(){
  localStorage.setItem("beanSave", JSON.stringify({
    beanCoins, xp, level, upgrades
  }));
  alert("💾 saved bean reality");
}

// load
(function load(){
  const save = JSON.parse(localStorage.getItem("beanSave"));
  if(!save) return;

  beanCoins = save.beanCoins;
  xp = save.xp;
  level = save.level;
  upgrades = save.upgrades;

  updateUI();
})();

updateUI();
getMeme();

</script>

</body>
</html>
