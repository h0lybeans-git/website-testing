<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WELCOME TO BEANLAND!!!</title>

  <style>
    body {
      background: linear-gradient(to bottom right, #111, #222);
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 30px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #00ff99;
    }

    p {
      opacity: 0.8;
    }

    #title {
      margin-top: 20px;
      padding: 10px;
    }

    img {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      transition: 0.3s ease;
    }

    button {
      margin: 10px;
      padding: 14px 22px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #00cc88;
      color: white;
      transition: 0.2s ease;
      box-shadow: 0 0 15px rgba(0,255,150,0.4);
    }

    button:hover {
      transform: scale(1.05);
    }

    #loading {
      margin-top: 15px;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 38px;
      }

      button {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <h1>WELCOME TO BEANLAND!!!</h1>

  <p>this website was built under emotional pressure</p>

  <button onclick="getMeme()">🎲 give meme</button>

  <button onclick="chaosMode()">👹 chaos mode</button>

  <div id="loading"></div>

  <h2 id="title"></h2>

  <img id="meme" src="" alt="meme loading...">

<script>

  let recentMemes = [];
  let chaosInterval = null;

  const subreddits = [
    "shitposting",
    "dankmemes",
    "fuckyouinparticular"
  ];

  function normalize(str) {
    return (str || "").toLowerCase().replace(/\s/g, "");
  }

  async function getMeme() {

    document.getElementById("loading").innerText =
      "fetching internet damage...";

    try {

      const randomSub =
        subreddits[Math.floor(Math.random() * subreddits.length)];

      let data;

      // fetch until we get something not recently seen
      do {

        const response =
          await fetch(`https://meme-api.com/gimme/${randomSub}`);

        data = await response.json();

      } while (
        recentMemes.some(m =>
          m.url === data.url ||
          normalize(m.title) === normalize(data.title)
        ) ||
        data.nsfw === true ||
        data.url.endsWith(".mp4") ||
        data.url.endsWith(".gif")
      );

      // store memory
      recentMemes.push({
        url: data.url,
        title: data.title
      });

      if (recentMemes.length > 30) {
        recentMemes.shift();
      }

      document.getElementById("meme").src = data.url;

      document.getElementById("title").innerText =
        `[r/${randomSub}] ${data.title}`;

      document.getElementById("loading").innerText = "";

    } catch (error) {

      document.getElementById("loading").innerText =
        "meme machine exploded";

      console.error(error);
    }
  }

  function chaosMode() {

    if (chaosInterval) {

      clearInterval(chaosInterval);
      chaosInterval = null;

      alert("chaos contained");
      return;
    }

    alert("CHAOS MODE ACTIVATED");

    chaosInterval = setInterval(getMeme, 1200);
  }

  getMeme();

</script>

</body>
</html>
