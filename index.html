<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WELCOME TO BEANLAND!!!</title>

  <style>
    body {
      background: linear-gradient(to bottom right, #111, #222);
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 30px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #00ff99;
    }

    p { opacity: 0.8; }

    #title { margin-top: 20px; padding: 10px; }

    img {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      transition: 0.3s ease;
    }

    button {
      margin: 10px;
      padding: 14px 22px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #00cc88;
      color: white;
      transition: 0.2s ease;
      box-shadow: 0 0 15px rgba(0,255,150,0.4);
    }

    button:hover { transform: scale(1.05); }

    #loading { margin-top: 15px; opacity: 0.7; }

    #coins {
      margin-top: 10px;
      font-size: 22px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 38px; }
      button { width: 90%; }
    }
  </style>
</head>

<body>

  <h1>WELCOME TO BEANLAND!!!</h1>
  <p>this website was built under emotional pressure</p>

  <div id="coins">🪙 Bean Coins: 0</div>

  <button onclick="getMeme()">🎲 give meme</button>
  <button onclick="chaosMode()">👹 chaos mode</button>

  <button onclick="buySpeed()">⚡ faster memes (10🪙)</button>
  <button onclick="buyQuality()">🧪 better memes (15🪙)</button>
  <button onclick="buyLuck()">🍀 luck boost (20🪙)</button>

  <div id="loading"></div>

  <h2 id="title"></h2>

  <img id="meme" src="" alt="meme loading...">

<script>

let recentMemes = [];
let chaosInterval = null;

let beanCoins = 0;

let upgrades = {
  speed: 0,
  quality: 0,
  luck: 0
};

const subreddits = [
  "shitposting",
  "dankmemes",
  "fuckyouinparticular",
  "memes",
  "me_irl",
  "wholesomememes",
  "AdviceAnimals",
  "funny",
  "ComedyCemetery",
  "bonehurtingjuice",
  "absolutelynotme_irl",
  "btd6"
];

function normalize(str) {
  return (str || "").toLowerCase().replace(/\s/g, "");
}

function updateCoins() {
  document.getElementById("coins").innerText =
    `🪙 Bean Coins: ${beanCoins}`;
}

function earnCoins(ups) {
  let gain = 1;

  if (ups > 500) gain = 5;
  else if (ups > 200) gain = 3;
  else if (ups > 50) gain = 2;

  beanCoins += gain;
  updateCoins();
}

async function getMeme() {

  const loading = document.getElementById("loading");
  const img = document.getElementById("meme");

  loading.innerText = "scanning meme quality...";

  try {

    const randomSub =
      subreddits[Math.floor(Math.random() * subreddits.length)];

    let data = null;

    for (let attempts = 0; attempts < 5; attempts++) {

      const response =
        await fetch(`https://meme-api.com/gimme/${randomSub}`);

      const candidate = await response.json();

      const title = normalize(candidate.title || "");

      let boostedUps = candidate.ups || 0;

      // luck upgrade = occasional fake boost
      if (upgrades.luck > 0 && Math.random() < upgrades.luck * 0.05) {
        boostedUps += 1000;
      }

      const isBad =
        !candidate.url ||
        candidate.nsfw === true ||
        candidate.url.endsWith(".mp4") ||
        candidate.url.endsWith(".gif") ||
        title.length < 3 ||
        title.length > 150 ||
        boostedUps < (8 + upgrades.quality * 5) ||
        recentMemes.some(m => m.url === candidate.url);

      data = candidate;

      if (!isBad) {
        data.ups = boostedUps;
        break;
      }

    }

    if (!data || !data.url) throw new Error("No valid meme found");

    recentMemes.push({ url: data.url, title: data.title });

    if (recentMemes.length > 30) recentMemes.shift();

    img.src = data.url;

    document.getElementById("title").innerText =
      `[r/${randomSub}] ${data.title}`;

    earnCoins(data.ups || 0);

  } catch (error) {

    console.error(error);

    img.src = "https://i.imgflip.com/1ur9b0.jpg";

    document.getElementById("title").innerText =
      "fallback meme engaged (reality unstable)";

  } finally {
    loading.innerText = "";
  }
}

function chaosMode() {

  if (chaosInterval) {
    clearInterval(chaosInterval);
    chaosInterval = null;
    alert("chaos contained");
    return;
  }

  alert("CHAOS MODE ACTIVATED");

  chaosInterval = setInterval(
    getMeme,
    Math.max(300, 1200 - upgrades.speed * 200)
  );
}

// 🛠 UPGRADES

function buySpeed() {
  if (beanCoins < 10) return alert("not enough beans");
  beanCoins -= 10;
  upgrades.speed++;
  updateCoins();
}

function buyQuality() {
  if (beanCoins < 15) return alert("not enough beans");
  beanCoins -= 15;
  upgrades.quality++;
  updateCoins();
}

function buyLuck() {
  if (beanCoins < 20) return alert("not enough beans");
  beanCoins -= 20;
  upgrades.luck++;
  updateCoins();
}

getMeme();

</script>

</body>
</html>
