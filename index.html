<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WELCOME TO BEANLAND!!!</title>

<style>
body {
  background: linear-gradient(to bottom right, #111, #222);
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
  padding: 30px;
}

h1 {
  font-size: 60px;
  text-shadow: 0 0 15px #00ff99;
}

#coins, #level {
  font-size: 20px;
  margin: 5px;
}

#shop {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  display: inline-block;
}

button {
  margin: 6px;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00cc88;
  color: white;
}

img {
  max-width: 90%;
  max-height: 60vh;
  margin-top: 20px;
  border-radius: 15px;
}

#terminal {
  display: none;
  margin-top: 20px;
  padding: 20px;
  background: black;
  color: #00ff66;
  font-family: monospace;
  text-align: left;
  border-radius: 15px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}

#terminalInput {
  width: 90%;
  margin-top: 10px;
  background: #111;
  color: #00ff66;
  border: none;
  padding: 10px;
  font-family: monospace;
  outline: none;
}
</style>
</head>

<body>

<h1>WELCOME TO BEANLAND!!!</h1>

<div id="coins">🪙 Coins: 0</div>
<div id="level">📈 Level: 1 (XP: 0/100)</div>

<div id="shop">
  <h3>🛒 Shop</h3>
  <button onclick="buySpeed()">⚡ Speed (10)</button>
  <button onclick="buyQuality()">🧪 Quality (15)</button>
  <button onclick="buyLuck()">🍀 Luck (20)</button>
  <button onclick="buyXPBoost()">📈 XP Boost (25)</button>
</div>

<br>

<button onclick="getMeme()">🎲 Meme</button>
<button onclick="chaosMode()">👹 Chaos</button>
<button onclick="saveGame()">💾 Save</button>

<h2 id="title"></h2>
<img id="meme">
<div id="loading"></div>

<!-- SHELL -->
<div id="terminal">
  <div id="terminalOutput">beans@beanland:~$</div>
  <input id="terminalInput" placeholder="type command..." />
</div>

<script>

let beanCoins = 0;
let xp = 0;
let level = 1;

let upgrades = { speed:0, quality:0, luck:0, xpBoost:0 };
let recent = [];
let chaos = null;

let shellUnlocked = false;
let keyBuffer = "";

function updateUI(){
  document.getElementById("coins").innerText = "🪙 Coins: " + beanCoins;
  document.getElementById("level").innerText =
    `📈 Level: ${level} (XP: ${xp}/100)`;
}

function addXP(a){
  xp += a + upgrades.xpBoost;
  if(xp >= 100){
    xp -= 100;
    level++;
    beanCoins += 10 * level;
  }
  updateUI();
}

function earnCoins(ups){
  let g = ups > 500 ? 5 : ups > 200 ? 3 : ups > 50 ? 2 : 1;
  beanCoins += g;
  addXP(g * 3);
  updateUI();
}

/* MEME */
async function getMeme(){
  document.getElementById("loading").innerText = "fetching chaos...";

  const subs = ["memes","dankmemes","shitposting","me_irl","funny"];
  const sub = subs[Math.floor(Math.random()*subs.length)];

  let data;

  for(let i=0;i<5;i++){
    const r = await fetch(`https://meme-api.com/gimme/${sub}`);
    const d = await r.json();
    if(!d.url || d.nsfw) continue;
    data = d;
    break;
  }

  if(!data) return;

  document.getElementById("meme").src = data.url;
  document.getElementById("title").innerText = `[r/${sub}] ${data.title}`;

  earnCoins(data.ups || 0);
  document.getElementById("loading").innerText = "";
}

function chaosMode(){
  if(chaos){clearInterval(chaos); chaos=null; return;}
  chaos = setInterval(getMeme, 1200 - upgrades.speed*200);
}

/* SHOP */
function buySpeed(){ if(beanCoins<10)return; beanCoins-=10; upgrades.speed++; updateUI(); }
function buyQuality(){ if(beanCoins<15)return; beanCoins-=15; upgrades.quality++; updateUI(); }
function buyLuck(){ if(beanCoins<20)return; beanCoins-=20; upgrades.luck++; updateUI(); }
function buyXPBoost(){ if(beanCoins<25)return; beanCoins-=25; upgrades.xpBoost++; updateUI(); }

/* SAVE */
function saveGame(){
  localStorage.setItem("beanSave", JSON.stringify({beanCoins,xp,level,upgrades}));
  alert("saved bean reality");
}

(function load(){
  const s = JSON.parse(localStorage.getItem("beanSave"));
  if(!s) return;
  beanCoins = s.beanCoins;
  xp = s.xp;
  level = s.level;
  upgrades = s.upgrades;
  updateUI();
})();

/* SHELL FIXED */
function initShell(){
  const input = document.getElementById("terminalInput");
  const out = document.getElementById("terminalOutput");

  function print(t){
    out.innerHTML += "<br>beans@beanland:~$ " + t;
  }

  input.addEventListener("keydown",(e)=>{
    if(e.key!=="Enter") return;

    const cmd = input.value.trim();
    input.value="";

    print(cmd);

    switch(cmd.toLowerCase()){
      case "help":
        print("help, neofetch, beanstats, sudo chaos, clear, rm reality");
        break;
      case "neofetch":
        print("BeanOS v6.9 🐧");
        break;
      case "beanstats":
        print(`coins=${beanCoins} level=${level} xp=${xp}`);
        break;
      case "sudo chaos":
        chaosMode();
        print("chaos enabled");
        break;
      case "rm reality":
        document.body.style.transform="rotate(1deg)";
        print("reality deleted");
        break;
      case "clear":
        out.innerHTML="beans@beanland:~$";
        break;
      default:
        print("command not found");
    }
  });
}

/* SECRET UNLOCK */
document.addEventListener("keydown",(e)=>{
  keyBuffer += e.key.toLowerCase();
  if(keyBuffer.length>60) keyBuffer=keyBuffer.slice(-60);

  if(keyBuffer.includes("bean shell") && !shellUnlocked){
    shellUnlocked = true;
    document.getElementById("terminal").style.display="block";
    document.getElementById("title").innerText="shell unlocked";
    initShell();
  }
});

updateUI();
getMeme();

</script>

</body>
</html>
