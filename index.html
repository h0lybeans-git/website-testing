<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WELCOME TO BEANLAND!!!</title>

  <style>
    body {
      background-color: #111;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;

    }

    h1 {

    img {

<body>

  <h1>WELCOME TO BEANLAND!!!</h1>

  <p>this website was built under emotional pressure</p>

  <button onclick="getMeme()">give meme</button>
  <h2 id="title"></h2>
  <br>
  
  <img id="meme" src="" alt="meme loading...">

  <script>
  let lastMeme = "";

  const subreddits = [
    "shitposting",
    "dankmemes",
    "fuckyouinparticular"
  ];

  async function getMeme() {
    try {

      const randomSub =
        subreddits[Math.floor(Math.random() * subreddits.length)];

      let data;

      do {
        const response =
          await fetch(`https://meme-api.com/gimme/${randomSub}`);

        data = await response.json();

      } while (data.url === lastMeme);

      lastMeme = data.url;

      document.getElementById("meme").src = data.url;

      document.getElementById("title").innerText =
        `[r/${randomSub}] ${data.title}`;

    } catch (error) {
      alert("meme machine exploded");
      console.error(error);
    }
  }

  getMeme();
</script>
