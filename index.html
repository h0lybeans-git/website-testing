<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WELCOME TO BEANLAND!!!</title>

  <style>
    body {
      background: linear-gradient(to bottom right, #111, #222);
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 30px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #00ff99;
    }

    p {
      opacity: 0.8;
    }

    #title {
      margin-top: 20px;
      padding: 10px;
    }

    img {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      transition: 0.3s ease;
    }

    button {
      margin: 10px;
      padding: 14px 22px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #00cc88;
      color: white;
      transition: 0.2s ease;
      box-shadow: 0 0 15px rgba(0,255,150,0.4);
    }

    button:hover {
      transform: scale(1.05);
    }

    #loading {
      margin-top: 15px;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 38px;
      }

      button {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <h1>WELCOME TO BEANLAND!!!</h1>

  <p>this website was built under emotional pressure</p>

  <button onclick="getMeme()">🎲 give meme</button>

  <button onclick="chaosMode()">👹 chaos mode</button>

  <div id="loading"></div>

  <h2 id="title"></h2>

  <img id="meme" src="" alt="meme loading...">

<script>

  let recentMemes = [];
  let chaosInterval = null;

  const subreddits = [
    "shitposting",
    "dankmemes",
    "fuckyouinparticular"
  ];

  function normalize(str) {
    return (str || "").toLowerCase().replace(/\s/g, "");
  }

  async function getMeme() {

    const loading = document.getElementById("loading");
    loading.innerText = "scanning meme quality...";

    try {

      const randomSub =
        subreddits[Math.floor(Math.random() * subreddits.length)];

      let data;
      let attempts = 0;

      do {

        const response =
          await fetch(`https://meme-api.com/gimme/${randomSub}`);

        data = await response.json();

        attempts++;

        const titleBad =
          normalize(data.title).length < 5 ||
          normalize(data.title).length > 120;

        const qualityBad =
          data.ups < 200;

        if (attempts > 5) break;

      } while (
        attempts < 5 && (
          recentMemes.some(m =>
            m.url === data.url ||
            normalize(m.title) === normalize(data.title)
          ) ||
          data.nsfw === true ||
          data.url.endsWith(".mp4") ||
          data.url.endsWith(".gif") ||
          titleBad ||
          qualityBad
        )
      );

      recentMemes.push({
        url: data.url,
        title: data.title
      });

      if (recentMemes.length > 30) {
        recentMemes.shift();
      }

      document.getElementById("meme").src = data.url;

      document.getElementById("title").innerText =
        `[r/${randomSub}] ${data.title}`;

    } catch (error) {

      console.error(error);

      document.getElementById("meme").src =
        "https://i.imgflip.com/1ur9b0.jpg";

      document.getElementById("title").innerText =
        "meme system had a breakdown";

    } finally {
      loading.innerText = "";
    }
  }

</script>

</body>
</html>
