<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WELCOME TO BEANLAND!!!</title>

<style>
body {
  background: linear-gradient(to bottom right, #111, #222);
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
  padding: 30px;
}

h1 {
  font-size: 60px;
  text-shadow: 0 0 15px #00ff99;
}

#coins {
  font-size: 22px;
  margin: 10px;
}

#shop, #secret {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  display: inline-block;
}

button {
  margin: 8px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00cc88;
  color: white;
}

button:hover {
  transform: scale(1.05);
}

img {
  max-width: 90%;
  max-height: 70vh;
  margin-top: 20px;
  border-radius: 15px;
}

#loading {
  margin-top: 10px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>WELCOME TO BEANLAND!!!</h1>
<p>this website was built under emotional pressure</p>

<div id="coins">🪙 Bean Coins: 0</div>

<!-- SHOP -->
<div id="shop">
  <h3>🛒 BEAN SHOP</h3>
  <button onclick="buySpeed()">⚡ Speed (10)</button>
  <button onclick="buyQuality()">🧪 Quality (15)</button>
  <button onclick="buyLuck()">🍀 Luck (20)</button>
</div>

<!-- SECRET -->
<div id="secret" style="display:none;">
  <h3>🔐 OS SECRET ZONE</h3>
  <button onclick="osReward()">💰 Claim OS Bonus</button>
  <button onclick="chaosOverclock()">👹 Chaos Overclock</button>
  <p id="osmsg"></p>
</div>

<button onclick="getMeme()">🎲 Meme</button>
<button onclick="chaosMode()">👹 Chaos</button>

<div id="loading"></div>
<h2 id="title"></h2>
<img id="meme">

<script>
let beanCoins = 0;
let recent = [];
let chaos = null;

let upgrades = { speed: 0, quality: 0, luck: 0 };

function updateCoins() {
  document.getElementById("coins").innerText =
    "🪙 Bean Coins: " + beanCoins;
}

function earn(ups) {
  let gain = 1;
  if (ups > 500) gain = 5;
  else if (ups > 200) gain = 3;
  else if (ups > 50) gain = 2;

  beanCoins += gain;
  updateCoins();
}

function norm(s){return (s||"").toLowerCase().replace(/\s/g,"");}

async function getMeme() {
  const load = document.getElementById("loading");
  load.innerText = "scanning memes...";

  const subs = ["shitposting","dankmemes","memes","me_irl","funny"];
  const sub = subs[Math.floor(Math.random()*subs.length)];

  let data;

  for(let i=0;i<5;i++){
    const res = await fetch(`https://meme-api.com/gimme/${sub}`);
    const d = await res.json();

    const bad =
      !d.url ||
      d.nsfw ||
      d.url.endsWith(".mp4") ||
      recent.includes(d.url);

    data = d;
    if(!bad) break;
  }

  recent.push(data.url);
  if(recent.length>30) recent.shift();

  document.getElementById("meme").src = data.url;
  document.getElementById("title").innerText = `[r/${sub}] ${data.title}`;

  earn(data.ups || 0);
  load.innerText = "";
}

function chaosMode(){
  if(chaos){clearInterval(chaos); chaos=null; return;}

  chaos = setInterval(getMeme, Math.max(200,1200-upgrades.speed*200));
}

function buySpeed(){
  if(beanCoins<10)return;
  beanCoins-=10; upgrades.speed++; updateCoins();
}

function buyQuality(){
  if(beanCoins<15)return;
  beanCoins-=15; upgrades.quality++; updateCoins();
}

function buyLuck(){
  if(beanCoins<20)return;
  beanCoins-=20; upgrades.luck++; updateCoins();
}

// OS detection
function getOS(){
  const ua=navigator.userAgent;
  if(ua.includes("Linux")) return "linux";
  if(ua.includes("Windows")) return "windows";
  if(ua.includes("Mac")) return "mac";
  return "unknown";
}

const os = getOS();
let osBonus = 0;

if(os==="linux"){
  osBonus=50;
  document.getElementById("secret").style.display="block";
  document.getElementById("osmsg").innerText="🐧 Linux detected";
}
if(os==="windows"){
  osBonus=20;
  document.getElementById("secret").style.display="block";
  document.getElementById("osmsg").innerText="🪟 Windows detected";
}
if(os==="mac"){
  osBonus=30;
  document.getElementById("secret").style.display="block";
  document.getElementById("osmsg").innerText="🍎 Mac detected";
}

function osReward(){
  beanCoins+=osBonus;
  updateCoins();
}

function chaosOverclock(){
  if(chaos)clearInterval(chaos);

  let speed = os==="linux"?120:os==="mac"?180:250;
  chaos = setInterval(getMeme, speed);
}

getMeme();
</script>

</body>
</html>
