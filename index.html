<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WELCOME TO BEANLAND!!!</title>

  <style>
    body {
      background-color: #111;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 {
      font-size: 60px;
    }

    img {
      width: 400px;
      max-width: 90%;
      border-radius: 12px;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>WELCOME TO BEANLAND!!!</h1>

  <p>this website was built under emotional pressure</p>

  <button onclick="getMeme()">give meme</button>

  <br>

  <img id="meme" src="" alt="meme loading...">

  <script>
  let lastMeme = "";

  async function getMeme() {
    try {
      let data;

      do {
        const response = await fetch("https://meme-api.com/gimme");
        data = await response.json();
      } while (data.url === lastMeme);

      lastMeme = data.url;

      document.getElementById("meme").src = data.url;

    } catch (error) {
      alert("meme machine exploded");
      console.error(error);
    }
  }

  getMeme();
</script>

</body>
</html>
